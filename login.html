<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="K-MODU는 한국 디자이너 브랜드와 글로벌 패션 크리에이터를 연결합니다." />
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link rel="apple-touch-icon" href="assets/favicon.png" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="K-MODU by MARKBRIDGE" />
  <meta property="og:description" content="K-MODU는 한국 디자이너 브랜드와 글로벌 패션 크리에이터를 연결합니다." />
  <meta property="og:image" content="assets/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <title>Login | K-MODU</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="platform.css?v=20260603a" />
</head>
<body>
  <main class="platform">
    <header class="topbar">
      <a class="brand" href="/#home"><img src="assets/k-modu-logo.png" alt="K-MODU" /></a>
      <nav class="topnav">
        <a href="/#about">소개</a>
        <a href="/designers">디자이너</a>
        <a href="/creators">크리에이터</a>
        <a href="/#contact">문의</a>
      </nav>
      <div class="top-actions">
        <a href="/apply">입점 신청</a>
        <a class="pill" href="/">홈으로</a>
      </div>
      <details class="platform-menu">
        <summary aria-label="메뉴"><span></span></summary>
        <div class="platform-menu-panel">
          <a href="/#about">소개</a>
          <a href="/designers">디자이너</a>
          <a href="/creators">크리에이터</a>
          <a href="/#contact">문의</a>
          <a href="/apply">입점 신청</a>
        </div>
      </details>
    </header>

    <section class="login-shell">
      <div class="login-visual">
        <img src="assets/LOGIN_IMG1.png" alt="K-MODU campaign visual" />
        <div class="login-visual-copy">
          <p class="eyebrow">K-Fashion, All Connected</p>
          <h1>Partner<br />Campaign<br />Access</h1>
          <p>K-MODU 파트너 계정으로 상품, AI 룩, 캠페인 운영 상태를 관리할 수 있습니다.</p>
        </div>
      </div>

      <div class="login-panel">
        <div class="login-card">
          <p class="eyebrow">Partner Login</p>
          <h2>Sign in to K-MODU</h2>
          <p>승인된 파트너 계정으로만 로그인할 수 있습니다.</p>

          <form id="partnerLoginForm">
            <div class="form-grid" style="grid-template-columns: 1fr;">
              <div class="field">
                <label for="email">Email</label>
                <input id="email" name="email" type="text" placeholder="파트너 계정 이메일" autocomplete="username" required />
              </div>
              <div class="field">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" placeholder="비밀번호" autocomplete="current-password" required />
              </div>
            </div>
            <p id="loginStatus" class="login-footnote" role="status" aria-live="polite"></p>
            <div class="form-actions">
              <button class="pill" type="submit">Login</button>
            </div>
          </form>

          <p class="login-footnote">아직 계정이 없다면 먼저 <a href="/apply">디자이너 브랜드 신청</a>을 제출해주세요. 승인 후 파트너 계정이 발급됩니다.</p>
        </div>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById("partnerLoginForm");
    const statusEl = document.getElementById("loginStatus");

    async function login(email, password) {
      statusEl.textContent = "로그인 중입니다...";
      const response = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      const result = await response.json().catch(() => ({}));
      if (!response.ok || !result.ok) {
        throw new Error(result.error || "로그인에 실패했습니다.");
      }
      window.location.href = result.redirectTo || "/";
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const data = new FormData(form);
      try {
        await login(String(data.get("email") || "").trim(), String(data.get("password") || ""));
      } catch (error) {
        statusEl.textContent = error instanceof Error ? error.message : "로그인에 실패했습니다.";
      }
    });
  </script>
</body>
</html>
