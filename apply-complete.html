<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="한국 디자이너 브랜드를 글로벌 패션·뷰티 크리에이터와 연결하는 매칭 플랫폼. 마크브릿지가 운영합니다." />
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link rel="apple-touch-icon" href="assets/favicon.png" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="K-MODU by MARKBRIDGE" />
  <meta property="og:description" content="한국 디자이너 브랜드를 글로벌 패션·뷰티 크리에이터와 연결합니다." />
  <meta property="og:image" content="assets/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <title>Application Complete | K-MODU</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="platform.css" />
  <style>
    /* Toss-Style Success Screen Custom CSS */
    .success-container {
      max-width: 480px;
      margin: 80px auto 100px;
      padding: 0 24px;
      text-align: center;
    }

    /* Animated Checkmark SVG */
    .checkmark-wrapper {
      width: 80px;
      height: 80px;
      margin: 0 auto 32px;
    }

    .checkmark {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: block;
      stroke-width: 2;
      stroke: var(--paper);
      stroke-miterlimit: 10;
      box-shadow: inset 0px 0px 0px var(--ink);
      animation: fill .4s ease-in-out .4s forwards, scale .3s ease-in-out .9s both;
    }

    .checkmark-circle {
      stroke-dasharray: 166;
      stroke-dashoffset: 166;
      stroke-width: 2;
      stroke-miterlimit: 10;
      stroke: var(--line);
      fill: none;
      animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
    }

    .checkmark-check {
      transform-origin: 50% 50%;
      stroke-dasharray: 48;
      stroke-dashoffset: 48;
      stroke: var(--ink);
      animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.6s forwards;
    }

    @keyframes stroke {
      100% {
        stroke-dashoffset: 0;
      }
    }

    @keyframes scale {
      0%, 100% {
        transform: none;
      }
      50% {
        transform: scale3d(1.1, 1.1, 1);
      }
    }

    @keyframes fill {
      100% {
        box-shadow: inset 0px 0px 0px 40px var(--line);
      }
    }

    /* Success Typography */
    .success-title {
      font-size: clamp(24px, 5vw, 30px);
      font-weight: var(--fw-bold);
      line-height: 1.36;
      letter-spacing: -0.04em;
      margin: 0 0 12px;
      color: var(--ink);
      white-space: pre-line;
    }

    .success-subtitle {
      font-size: var(--fs-body);
      color: var(--muted);
      line-height: 1.6;
      margin: 0 0 40px;
      font-weight: var(--fw-regular);
      word-break: keep-all;
    }

    /* Toss Receipt Info Card */
    .receipt-card {
      background: var(--input-bg);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 24px 28px;
      text-align: left;
      margin-bottom: 48px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
    }

    .receipt-title {
      font-size: var(--fs-label-sm);
      font-weight: var(--fw-extrabold);
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
    }

    .receipt-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: var(--fs-sm);
    }

    .receipt-row:last-child {
      margin-bottom: 0;
    }

    .receipt-label {
      color: var(--muted);
      font-weight: var(--fw-medium);
    }

    .receipt-value {
      color: var(--ink);
      font-weight: var(--fw-bold);
    }

    .receipt-status-badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 10px;
      background: var(--ink);
      color: var(--paper);
      border-radius: 12px;
      font-size: var(--fs-micro);
      font-weight: var(--fw-extrabold);
      letter-spacing: 0.04em;
    }

    /* Action Buttons */
    .success-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .toss-btn {
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      border: none;
      border-radius: 14px;
      font-size: var(--fs-body);
      font-weight: var(--fw-bold);
      cursor: pointer;
      transition: all 0.24s ease;
      outline: none;
    }

    .toss-btn.primary {
      background: var(--ink);
      color: var(--paper);
    }

    .toss-btn.secondary {
      background: var(--line);
      color: var(--ink);
    }

    .toss-btn.secondary:hover {
      background: rgba(5, 5, 5, 0.08);
    }
    body.dark-theme .toss-btn.secondary:hover {
      background: rgba(247, 247, 244, 0.08);
    }
  </style>
</head>
<body>
  <main class="platform">
    <header class="topbar">
      <a class="brand" href="/#home"><img src="assets/k-modu-logo.png" alt="K-MODU" /></a>
      <nav class="topnav">
        <a href="/#about">소개</a>
        <a href="/designers">디자이너</a>
        <a href="/creators">크리에이터</a>
        <a href="/#contact">문의</a>
      </nav>
      <div class="top-actions">
        <button id="themeToggleBtn" aria-label="테마 전환" style="background:none; border:none; color:var(--ink); font-size:var(--fs-label-sm); font-weight:var(--fw-extrabold); cursor:pointer; letter-spacing:.08em; padding:0; text-transform:uppercase; margin-right:12px; display:inline-flex; align-items:center;">다크</button>
        <a href="/admin">관리자</a>
        <a class="pill" href="/apply">입점 신청</a>
      </div>
      <details class="platform-menu">
        <summary aria-label="메뉴"><span></span></summary>
        <div class="platform-menu-panel">
          <a href="/#about">소개</a>
          <a href="/designers">디자이너</a>
          <a href="/creators">크리에이터</a>
        <a href="/#contact">문의</a>
          <a href="/apply">입점 신청</a>
          <a href="/login">로그인</a>
        </div>
      </details>
    </header>

    <div class="success-container">
      <!-- Animated Checkmark -->
      <div class="checkmark-wrapper">
        <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
          <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
          <path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
        </svg>
      </div>

      <!-- Personalized Dynamic Title -->
      <h1 class="success-title" id="successTitle">브랜드 입점 신청이<br>성공적으로 완료되었습니다.</h1>
      <p class="success-subtitle">제출해 주신 브랜드 스토리를 기반으로 크리에이터 매칭을 위한 검토가 곧바로 시작됩니다.</p>

      <!-- Toss-style Receipt Card -->
      <div class="receipt-card">
        <h2 class="receipt-title">신청 브랜드 접수 영수증</h2>

        <div class="receipt-row">
          <span class="receipt-label">브랜드명</span>
          <span class="receipt-value" id="receiptBrand">-</span>
        </div>

        <div class="receipt-row">
          <span class="receipt-label">디자이너</span>
          <span class="receipt-value" id="receiptDesigner">-</span>
        </div>

        <div class="receipt-row">
          <span class="receipt-label">접수 일시</span>
          <span class="receipt-value" id="receiptDate">-</span>
        </div>

        <div class="receipt-row">
          <span class="receipt-label">심사 상태</span>
          <span class="receipt-value">
            <span class="receipt-status-badge">Reviewing</span>
          </span>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="success-actions">
        <a href="/admin" class="toss-btn primary">관리자 대시보드에서 확인</a>
        <a href="/#home" class="toss-btn secondary">홈으로 돌아가기</a>
      </div>
    </div>

    <footer class="footer-mini">K-MODU by MARKBRIDGE</footer>
  </main>

  <script>
    // --- 1. GLOBAL THEME MANAGER ---
    const themeToggleBtn = document.getElementById('themeToggleBtn');

    function applyTheme(theme) {
      if (theme === 'dark') {
        document.body.classList.add('dark-theme');
        if (themeToggleBtn) themeToggleBtn.textContent = '라이트';
      } else {
        document.body.classList.remove('dark-theme');
        if (themeToggleBtn) themeToggleBtn.textContent = '다크';
      }
    }

    const savedTheme = localStorage.getItem('k_modu_theme') || 'light';
    applyTheme(savedTheme);

    if (themeToggleBtn) {
      themeToggleBtn.addEventListener('click', () => {
        const currentTheme = document.body.classList.contains('dark-theme') ? 'light' : 'dark';
        localStorage.setItem('k_modu_theme', currentTheme);
        applyTheme(currentTheme);
      });
    }

    // --- 2. DYNAMIC RECEIPT DATA POPULATOR ---
    try {
      const apps = JSON.parse(localStorage.getItem('k_modu_applications')) || [];
      if (apps.length > 0) {
        const latestApp = apps[0];

        // Populate personalized title
        document.getElementById('successTitle').innerHTML = `${latestApp.brand} 브랜드의<br>신청이 완료되었습니다.`;

        // Populate receipt cards
        document.getElementById('receiptBrand').textContent = latestApp.brand;
        document.getElementById('receiptDesigner').textContent = latestApp.designer;
        document.getElementById('receiptDate').textContent = latestApp.submitted;
      } else {
        // Fallback for demo direct visits
        const today = new Date();
        const formattedDate = `${today.getFullYear()}.${String(today.getMonth() + 1).padStart(2, '0')}.${String(today.getDate()).padStart(2, '0')}`;

        document.getElementById('receiptBrand').textContent = "K-MODU 파트너";
        document.getElementById('receiptDesigner').textContent = "검토 중";
        document.getElementById('receiptDate').textContent = formattedDate;
      }
    } catch (e) {
      // Fallback on error
    }
  </script>
</body>
</html>
